name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release --features visualization

    - name: Create package
      run: |
        mkdir release_package
        copy target\release\examples\generate_konata.exe release_package\
        xcopy visualization\static release_package\static\ /E /I /Y

    - name: Create run.bat
      shell: cmd
      run: |
        (echo @echo off) > release_package\run.bat
        (echo echo ============================================) >> release_package\run.bat
        (echo echo   ARM CPU Emulator - Windows) >> release_package\run.bat
        (echo echo ============================================) >> release_package\run.bat
        (echo echo.) >> release_package\run.bat
        (echo echo Running simulation...) >> release_package\run.bat
        (echo generate_konata.exe 10000 static\konata_data.json) >> release_package\run.bat
        (echo echo.) >> release_package\run.bat
        (echo echo Done! To view results:) >> release_package\run.bat
        (echo echo   cd static) >> release_package\run.bat
        (echo echo   python -m http.server 8080) >> release_package\run.bat
        (echo echo   Open: http://localhost:8080/konata_data_report.html) >> release_package\run.bat
        (echo pause) >> release_package\run.bat

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-windows
        path: release_package/
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release --features visualization

    - name: Create package
      run: |
        mkdir -p release_package
        cp target/release/examples/generate_konata release_package/
        cp -r visualization/static release_package/static

    - name: Create run.sh
      run: |
        cat > release_package/run.sh << 'EOF'
        #!/bin/bash
        echo "============================================"
        echo "  ARM CPU Emulator - Linux"
        echo "============================================"
        echo ""
        echo "Running simulation..."
        ./generate_konata 10000 static/konata_data.json
        echo ""
        echo "Done! To view results:"
        echo "  cd static && python3 -m http.server 8080"
        echo "  Open: http://localhost:8080/konata_data_report.html"
        EOF
        chmod +x release_package/run.sh release_package/generate_konata

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-linux
        path: release_package/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release --features visualization

    - name: Create package
      run: |
        mkdir -p release_package
        cp target/release/examples/generate_konata release_package/
        cp -r visualization/static release_package/static

    - name: Create run.sh
      run: |
        cat > release_package/run.sh << 'EOF'
        #!/bin/bash
        echo "============================================"
        echo "  ARM CPU Emulator - macOS"
        echo "============================================"
        echo ""
        echo "Running simulation..."
        ./generate_konata 10000 static/konata_data.json
        echo ""
        echo "Done! To view results:"
        echo "  cd static && python3 -m http.server 8080"
        echo "  Open: http://localhost:8080/konata_data_report.html"
        EOF
        chmod +x release_package/run.sh release_package/generate_konata

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-macos
        path: release_package/
        retention-days: 30
