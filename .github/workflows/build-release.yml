name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build library
      run: cargo build --release --features visualization

    - name: Build example
      run: cargo build --release --example cpu_emulator --features visualization

    - name: Verify build
      run: dir target\release\examples

    - name: Create package
      run: |
        mkdir release_package
        copy target\release\examples\cpu_emulator.exe release_package\
        copy test_programs\fibonacci.elf release_package\sample.elf

    - name: Create run.bat
      shell: pwsh
      run: |
        $batContent = @"
        @echo off
        echo ============================================
        echo   ARM CPU Emulator - Windows
        echo ============================================
        echo.
        echo Usage: cpu_emulator.exe ^<elf_file^> [max_instructions] [output.json]
        echo.
        echo Running sample simulation...
        cpu_emulator.exe sample.elf 10000
        echo.
        echo Done! Open sample_report.html to view results.
        pause
        "@
        Set-Content -Path "release_package\run.bat" -Value $batContent -NoNewline

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-windows
        path: release_package/
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build example
      run: cargo build --release --example cpu_emulator --features visualization

    - name: Create package
      run: |
        mkdir -p release_package
        cp target/release/examples/cpu_emulator release_package/
        cp test_programs/fibonacci.elf release_package/sample.elf

    - name: Create run.sh
      run: |
        cat > release_package/run.sh << 'EOF'
        #!/bin/bash
        echo "============================================"
        echo "  ARM CPU Emulator - Linux"
        echo "============================================"
        echo ""
        echo "Usage: ./cpu_emulator <elf_file> [max_instructions] [output.json]"
        echo ""
        echo "Running sample simulation..."
        ./cpu_emulator sample.elf 10000
        echo ""
        echo "Done! Open sample_report.html to view results."
        EOF
        chmod +x release_package/run.sh release_package/cpu_emulator

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-linux
        path: release_package/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build example
      run: cargo build --release --example cpu_emulator --features visualization

    - name: Create package
      run: |
        mkdir -p release_package
        cp target/release/examples/cpu_emulator release_package/
        cp test_programs/fibonacci.elf release_package/sample.elf

    - name: Create run.sh
      run: |
        cat > release_package/run.sh << 'EOF'
        #!/bin/bash
        echo "============================================"
        echo "  ARM CPU Emulator - macOS"
        echo "============================================"
        echo ""
        echo "Usage: ./cpu_emulator <elf_file> [max_instructions] [output.json]"
        echo ""
        echo "Running sample simulation..."
        ./cpu_emulator sample.elf 10000
        echo ""
        echo "Done! Open sample_report.html to view results."
        EOF
        chmod +x release_package/run.sh release_package/cpu_emulator

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cpu-emulator-macos
        path: release_package/
        retention-days: 30
