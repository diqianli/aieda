<!DOCTYPE html>
<html>
<head>
    <title>Konata Renderer Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #1a1a2e; color: white; font-family: sans-serif; }
        #container { width: 100%; height: 400px; background: #16213e; border: 1px solid #2a2a4a; }
        button { margin: 10px 5px; padding: 8px 16px; cursor: pointer; }
        #log { margin-top: 20px; padding: 10px; background: #0f3460; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Konata Renderer Test</h1>
    <div>
        <button onclick="loadTestData()">Load Test Data</button>
        <button onclick="zoomIn()">Zoom In</button>
        <button onclick="zoomOut()">Zoom Out</button>
        <button onclick="resetView()">Reset View</button>
    </div>
    <div id="container"></div>
    <div id="log"></div>

    <script src="konata/op.js"></script>
    <script src="konata/stage.js"></script>
    <script src="konata/konata_renderer.js"></script>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += msg + '<br>';
            console.log(msg);
        }

        log('Starting test...');
        log('KonataRenderer defined: ' + (typeof KonataRenderer !== 'undefined'));
        log('Op defined: ' + (typeof Op !== 'undefined'));
        log('Stage defined: ' + (typeof Stage !== 'undefined'));

        // Create renderer - make it global for testing
        const container = document.getElementById('container');
        window.renderer = null;

        try {
            window.renderer = new KonataRenderer(container);
            log('Renderer created successfully');
            log('Canvas size: ' + window.renderer.width + ' x ' + window.renderer.height);
        } catch (e) {
            log('Error creating renderer: ' + e.message);
        }

        function loadTestData() {
            if (!window.renderer) {
                log('Renderer not available');
                return;
            }

            // Create test data
            const testData = {
                ops: []
            };

            for (let i = 0; i < 20; i++) {
                testData.ops.push({
                    id: i,
                    gid: i,
                    rid: i,
                    fetched_cycle: i,
                    retired_cycle: i + 10,
                    label_name: ['ADD', 'SUB', 'MUL', 'LOAD', 'STORE'][i % 5] + ' X' + i,
                    pc: 0x1000 + i * 4,
                    lanes: {
                        main: {
                            name: 'main',
                            stages: [
                                { name: 'F', start_cycle: i, end_cycle: i + 1 },
                                { name: 'Dc', start_cycle: i + 1, end_cycle: i + 2 },
                                { name: 'Ds', start_cycle: i + 2, end_cycle: i + 3 },
                                { name: 'Is', start_cycle: i + 3, end_cycle: i + 4 },
                                { name: 'Ex', start_cycle: i + 4, end_cycle: i + 8 },
                                { name: 'Cm', start_cycle: i + 8, end_cycle: i + 9 },
                                { name: 'Rt', start_cycle: i + 9, end_cycle: i + 10 }
                            ]
                        }
                    },
                    prods: i > 0 ? [{ producer_id: i - 1, dep_type: 'register' }] : [],
                    src_regs: [i % 30],
                    dst_regs: [(i + 1) % 30],
                    is_memory: i % 5 === 3 || i % 5 === 4,
                    mem_addr: i % 5 === 3 ? 0x2000 + i * 8 : (i % 5 === 4 ? 0x3000 + i * 8 : null)
                });
            }

            log('Loading ' + testData.ops.length + ' test ops');
            window.renderer.updateSnapshot(testData);
            log('Data loaded');
        }

        function zoomIn() {
            if (window.renderer) window.renderer.zoomIn();
        }

        function zoomOut() {
            if (window.renderer) window.renderer.zoomOut();
        }

        function resetView() {
            if (window.renderer) window.renderer.resetView();
        }

        // Auto-load test data after a short delay
        setTimeout(loadTestData, 500);
    </script>
</body>
</html>
