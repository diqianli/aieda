<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM CPU Emulator - Konata Visualization</title>
    <link rel="stylesheet" href="/visualization/static/style.css?v=9">
</head>
<body>
    <div class="container">
        <header>
            <h1>ARM CPU Emulator - Pipeline Visualization</h1>
            <div class="file-controls">
                <label for="fileInput" class="btn btn-primary">Load JSON File</label>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
                <button id="reloadBtn" class="btn btn-secondary">Reload Data</button>
            </div>
        </header>

        <div class="metrics-bar">
            <div class="metric">
                <span class="metric-label">Total Cycles:</span>
                <span id="totalCycles" class="metric-value">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Instructions:</span>
                <span id="totalInstructions" class="metric-value">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Operations:</span>
                <span id="opsCount" class="metric-value">-</span>
            </div>
        </div>

        <!-- Main Konata Pipeline View -->
        <section class="konata-section">
            <h2>Konata Pipeline Visualization</h2>
            <div id="pipelineViewContainer" class="pipeline-view-container"></div>
        </section>
    </div>

    <div id="statusBar" class="status-bar">
        Ready. Load a konata_data.json file to visualize.
    </div>

    <!-- Load Konata dependencies -->
    <script src="/visualization/static/konata/op.js?v=8"></script>
    <script src="/visualization/static/konata/stage.js?v=11"></script>
    <script src="/visualization/static/konata/konata_renderer.js?v=8"></script>
    <script src="/visualization/static/pipeline_view.js?v=8"></script>
    <script src="/visualization/static/app_static.js?v=8"></script>
</body>
</html>
