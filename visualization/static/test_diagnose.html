<!DOCTYPE html>
<html>
<head>
    <title>Konata Diagnosis</title>
    <style>
        body { margin: 20px; padding: 0; background: #1a1a2e; color: white; font-family: sans-serif; }
        #container { width: 800px; height: 400px; background: #16213e; border: 2px solid #e94560; }
        #log { margin-top: 20px; padding: 10px; background: #0f3460; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Konata Renderer Diagnosis</h1>
    <div>
        <button onclick="runDiagnosis()">Run Diagnosis</button>
        <button onclick="testRender()">Test Render</button>
        <button onclick="loadRealData()">Load Real Data</button>
    </div>
    <div id="container"></div>
    <div id="log"></div>

    <script src="/konata/op.js?v=2"></script>
    <script src="/konata/stage.js?v=2"></script>
    <script src="/konata/konata_renderer.js?v=2"></script>

    <script>
        const log = (msg) => {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        };

        const clearLog = () => {
            document.getElementById('log').textContent = '';
        };

        let renderer = null;

        function runDiagnosis() {
            clearLog();
            log('=== KONATA DIAGNOSIS ===\n');

            // Check classes
            log('1. Checking classes...');
            log('   Op: ' + (typeof Op !== 'undefined' ? 'OK' : 'MISSING'));
            log('   Stage: ' + (typeof Stage !== 'undefined' ? 'OK' : 'MISSING'));
            log('   Lane: ' + (typeof Lane !== 'undefined' ? 'OK' : 'MISSING'));
            log('   KonataRenderer: ' + (typeof KonataRenderer !== 'undefined' ? 'OK' : 'MISSING'));

            // Check container
            log('\n2. Checking container...');
            const container = document.getElementById('container');
            log('   Container: ' + (container ? 'OK' : 'MISSING'));
            if (container) {
                const rect = container.getBoundingClientRect();
                log('   Container rect: ' + rect.width + ' x ' + rect.height);
            }

            // Create renderer
            log('\n3. Creating renderer...');
            try {
                renderer = new KonataRenderer(container);
                log('   Renderer created: OK');
                log('   Canvas size: ' + renderer.width + ' x ' + renderer.height);
                log('   Ops count: ' + renderer.ops.length);
            } catch (e) {
                log('   ERROR: ' + e.message);
                log('   Stack: ' + e.stack);
                return;
            }

            // Test Op creation
            log('\n4. Testing Op creation...');
            try {
                const testOpData = {
                    id: 0,
                    gid: 0,
                    rid: 0,
                    fetched_cycle: 0,
                    retired_cycle: 10,
                    label_name: 'TEST',
                    pc: 0x1000,
                    lanes: {
                        main: {
                            name: 'main',
                            stages: [
                                { name: 'F', start_cycle: 0, end_cycle: 1 },
                                { name: 'Ex', start_cycle: 2, end_cycle: 8 }
                            ]
                        }
                    },
                    prods: [],
                    src_regs: [],
                    dst_regs: [],
                    is_memory: false,
                    mem_addr: null
                };

                if (typeof Op !== 'undefined') {
                    const op = new Op(testOpData);
                    log('   Op created: OK');
                    log('   Op.id: ' + op.id);
                    log('   Op.fetchedCycle: ' + op.fetchedCycle);
                    log('   Op.lanes.size: ' + op.lanes.size);
                    log('   Op.earliestCycle: ' + op.earliestCycle);
                    log('   Op.latestCycle: ' + op.latestCycle);
                    log('   Op.formatPC(): ' + op.formatPC());
                } else {
                    log('   Op class not available (this is OK - renderer will use fallback)');
                    log('   Raw data test: id=' + testOpData.id + ', pc=0x' + testOpData.pc.toString(16));
                }
            } catch (e) {
                log('   ERROR: ' + e.message);
                log('   Stack: ' + e.stack);
            }

            log('\n=== DIAGNOSIS COMPLETE ===');
        }

        function testRender() {
            clearLog();
            log('=== TEST RENDER ===\n');

            if (!renderer) {
                const container = document.getElementById('container');
                renderer = new KonataRenderer(container);
            }

            // Create test data
            const testData = {
                ops: []
            };

            for (let i = 0; i < 10; i++) {
                testData.ops.push({
                    id: i,
                    gid: i,
                    rid: i,
                    fetched_cycle: i,
                    retired_cycle: i + 15,
                    label_name: 'ADD X' + i,
                    pc: 0x1000 + i * 4,
                    lanes: {
                        main: {
                            name: 'main',
                            stages: [
                                { name: 'F', start_cycle: i, end_cycle: i + 1 },
                                { name: 'Dc', start_cycle: i + 1, end_cycle: i + 2 },
                                { name: 'Ds', start_cycle: i + 2, end_cycle: i + 3 },
                                { name: 'Is', start_cycle: i + 3, end_cycle: i + 4 },
                                { name: 'Ex', start_cycle: i + 4, end_cycle: i + 12 },
                                { name: 'Cm', start_cycle: i + 12, end_cycle: i + 14 },
                                { name: 'Rt', start_cycle: i + 14, end_cycle: i + 15 }
                            ]
                        }
                    },
                    prods: [],
                    src_regs: [i],
                    dst_regs: [i + 1],
                    is_memory: false,
                    mem_addr: null
                });
            }

            log('Test data created with ' + testData.ops.length + ' ops');

            try {
                log('Calling updateSnapshot...');
                renderer.updateSnapshot(testData);
                log('updateSnapshot returned');

                log('\nRenderer state:');
                log('  width: ' + renderer.width);
                log('  height: ' + renderer.height);
                log('  ops.length: ' + renderer.ops.length);
                log('  scrollX: ' + renderer.scrollX);
                log('  scrollY: ' + renderer.scrollY);
                log('  zoom: ' + renderer.zoom);

                if (renderer.ops.length > 0) {
                    const op = renderer.ops[0];
                    log('\nFirst op:');
                    log('  id: ' + op.id);
                    log('  labelName: ' + op.labelName);
                    log('  earliestCycle: ' + op.earliestCycle);
                    log('  latestCycle: ' + op.latestCycle);
                }
            } catch (e) {
                log('ERROR: ' + e.message);
                log('Stack: ' + e.stack);
            }

            log('\n=== TEST COMPLETE ===');
        }

        async function loadRealData() {
            clearLog();
            log('=== LOAD REAL DATA ===\n');

            if (!renderer) {
                const container = document.getElementById('container');
                renderer = new KonataRenderer(container);
            }

            try {
                log('Fetching /api/konata...');
                const response = await fetch('/api/konata');
                const data = await response.json();
                log('Received ' + data.length + ' snapshots');

                if (data.length > 0) {
                    // Find snapshot with most ops
                    let best = data[0];
                    for (const snap of data) {
                        if (snap.ops && snap.ops.length > (best.ops ? best.ops.length : 0)) {
                            best = snap;
                        }
                    }
                    log('Best snapshot: cycle ' + best.cycle + ' with ' + (best.ops ? best.ops.length : 0) + ' ops');

                    if (best.ops && best.ops.length > 0) {
                        log('\nFirst op from API:');
                        log(JSON.stringify(best.ops[0], null, 2).substring(0, 500));

                        log('\nCalling updateSnapshot...');
                        renderer.updateSnapshot(best);
                        log('Done!');
                    }
                }
            } catch (e) {
                log('ERROR: ' + e.message);
                log('Stack: ' + e.stack);
            }

            log('\n=== LOAD COMPLETE ===');
        }

        // Auto-run diagnosis on load
        setTimeout(runDiagnosis, 100);
    </script>
</body>
</html>
